<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="style.css">

</head>

<body class="bg-light">


    <header>
        <nav>

        </nav>
    </header>
    <main class="d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4" style="width: 320px;">

            <h2 class="text-center mb-3" id="titulo">Login</h2>

            <form id="form-login">

                <div class="mb-3" class="conjunto">
                    <label for="email" class="forma-label">Email: </label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu Email" required>
                </div>
                <div class="mb-3" class="conjunto">
                    <label for="senha">Senha: </label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua Senha" required>
                </div>

                <button class="btn btn-primary w-100" type="submit">Entrar</button>

            </form>

            <div id="mensagem" class="mt-3"></div>

            <div class="text-center mt-3" id="toggle">
                <p> Não tem conta? Cadastre-se! </p>
            </div>
        </div>
    </main>
    <footer>
    </footer>
    <script src="script.js"></script>
</body>

</html>
